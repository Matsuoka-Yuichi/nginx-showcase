server {
    listen 8080;
    server_name localhost;

    large_client_header_buffers 4 16k;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files with proper caching headers
    location / {
        try_files $uri $uri/ =404;
    }

    # Enable directory listing for /files/
    location /files/ {
        alias /usr/share/nginx/html/;
        index _disabled;  # no index file — forces autoindex to activate
        autoindex on;
    }

    # Custom 404 page — served from a separate directory, NOT the web root.
    # "internal" means only internal redirects (like error_page) can reach this location.
    # Visiting /404.html directly still triggers error_page, so the user sees the
    # custom page either way — but with a 404 status code, not 200.
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/error-pages;
        internal;
    }
}

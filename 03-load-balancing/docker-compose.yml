services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy

  backend-1:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 5s

  backend-2:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-2
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 5s

  backend-3:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-3
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 5s

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3

  backend-1:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-1

  backend-2:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-2

  backend-3:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-3

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=10m;

server {
    listen 8080;
    server_name localhost;

    large_client_header_buffers 4 16k;

    # Cached endpoint — responses cached for 30 seconds
    location /slow {
        proxy_pass http://backend:5000/slow;
        proxy_cache my_cache;
        proxy_cache_valid 200 30s;

        # Add header so you can see HIT vs MISS
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Non-cached endpoint for comparison
    location / {
        proxy_pass http://backend:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

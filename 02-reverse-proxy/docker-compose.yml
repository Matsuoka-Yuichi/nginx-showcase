services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  backend:
    build: ../shared/backend
    environment:
      - INSTANCE_ID=backend-1
    # Note: no "ports" — the backend is only reachable through nginx

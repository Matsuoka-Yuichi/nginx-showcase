limit_req_zone $binary_remote_addr zone=standard:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/s;

server {
    listen 8080;
    server_name localhost;

    large_client_header_buffers 4 16k;

    # Standard rate limit: 5 requests/second, burst up to 10
    location / {
        limit_req zone=standard burst=10 nodelay;

        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Strict rate limit: 1 request/second, burst up to 3
    location /health {
        limit_req zone=strict burst=3 nodelay;

        proxy_pass http://backend:5000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Custom error page for rate limiting (503 is the default for limit_req)
    error_page 503 /503.html;
    location = /503.html {
        default_type text/html;
        return 503 '<!DOCTYPE html>
<html><head><title>429 Too Many Requests</title></head>
<body>
<h1>Rate Limit Exceeded</h1>
<p>You are sending too many requests. Please slow down and try again later.</p>
</body></html>';
    }
}
